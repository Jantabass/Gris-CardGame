
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Gris</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="menu" class="screen active">
      <h1 class="title">RETRO GRIS</h1>
      <button id="startBtn">Start Spill</button>
    </div>

    <div id="game" class="screen">
      <header>
        <h1>RETRO GRIS</h1>
        <button id="menuBtn">Hovedmeny</button>
      </header>

      <div id="status"></div>

      <section id="bot-area" class="player-area"></section>
      <section id="pile-area">
        <div id="draw-pile" class="card back"></div>
        <div id="discard-pile" class="pile"></div>
      </section>
      <section id="player-area" class="player-area"></section>

      <div id="controls">
        <button id="pickupBtn">Ta bunken</button>
      </div>
    </div>

    <div id="victory" class="screen">
      <h1 id="victoryText"></h1>
      <div class="victory-effect">✨🎉🏆🎉✨</div>
      <button id="restartBtn">Spill igjen</button>
      <button id="victoryMenuBtn">Hovedmeny</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
